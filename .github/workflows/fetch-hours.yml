name: Fetch Restaurant Hours

on:
  # Daily at 6am PT (13:00 UTC) across the event window: 2 days before
  # through 1 day after (event runs Jun 25–Jul 1, 2026). Two crons because
  # the window straddles the month boundary. Disable again after the event.
  schedule:
    - cron: "0 13 23-30 6 *"
    - cron: "0 13 1-2 7 *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-hours:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Google Place IDs (incremental)
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: python3 fetch-place-ids.py

      - name: Fetch hours from Google Places API
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: python3 fetch-hours.py

      - name: Commit place-ids.json and hours.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add place-ids.json hours.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update restaurant hours $(date -u +%Y-%m-%d) [skip ci]"
          git pull --rebase
          git push
