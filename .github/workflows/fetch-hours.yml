name: Fetch Restaurant Hours

# Permanent daily cron — scripts/workflow-gate.py decides whether today is
# inside the event window (from config.js), so starting or stopping an event
# never edits this file. Manual dispatch always runs.
on:
  schedule:
    - cron: "0 13 * * *" # Daily at 6am PT (13:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-hours:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check event window
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "active=true" >> "$GITHUB_OUTPUT"
          else
            python3 scripts/workflow-gate.py fetch-hours >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch hours from Google Places API
        if: steps.gate.outputs.active == 'true'
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: python3 fetch-hours.py

      - name: Commit hours.json if changed
        if: steps.gate.outputs.active == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hours.json
          git diff --cached --quiet && echo "No changes to hours.json" && exit 0
          git commit -m "Update restaurant hours $(date -u +%Y-%m-%d) [skip ci]"
          git pull --rebase
          git push
