<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — SB Food Week 2026 Map</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>"
    />
    <script src="../config.js"></script>
    <script>
      document.title = "Admin — " + THEME.eventName + " Map";
    </script>
    <style>
      :root {
        --orange: #e8590c;
        --cream: #fffaf5;
        --dark: #1a1a2e;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: var(--cream);
        color: #333;
        min-height: 100vh;
      }
      header {
        background: linear-gradient(135deg, var(--dark), #16213e);
        color: #fff;
        padding: 16px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      header h1 {
        font-size: 18px;
        font-weight: 700;
      }
      header h1 a {
        color: #fff;
        text-decoration: none;
      }
      .header-sub {
        font-size: 14px;
        opacity: 0.7;
        margin-left: 12px;
      }
      .header-left {
        display: flex;
        align-items: baseline;
      }
      .back-link {
        color: rgba(255, 255, 255, 0.8);
        text-decoration: none;
        font-size: 14px;
      }
      .back-link:hover {
        color: #fff;
      }
      main {
        max-width: 800px;
        margin: 0 auto;
        padding: 32px 20px;
      }

      /* Password gate */
      .auth-card {
        background: #fff;
        border-radius: 12px;
        padding: 32px;
        max-width: 400px;
        margin: 80px auto 0;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        text-align: center;
      }
      .auth-card h2 {
        font-size: 20px;
        margin-bottom: 8px;
      }
      .auth-card p {
        color: #666;
        font-size: 14px;
        margin-bottom: 20px;
      }
      .auth-card input {
        width: 100%;
        padding: 10px 14px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
        outline: none;
        transition: border-color 0.2s;
      }
      .auth-card input:focus {
        border-color: var(--orange);
      }
      .auth-card button {
        width: 100%;
        margin-top: 12px;
        padding: 10px;
        background: var(--orange);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
      }
      .auth-card button:hover {
        opacity: 0.9;
      }
      .auth-error {
        color: #d32f2f;
        font-size: 14px;
        margin-top: 12px;
        display: none;
      }

      /* Data view */
      .data-view {
        display: none;
      }
      .stat-total {
        font-size: 14px;
        color: #666;
        margin-bottom: 16px;
      }
      .stat-total strong {
        color: var(--orange);
        font-size: 18px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      }
      thead {
        background: var(--dark);
        color: #fff;
      }
      th {
        padding: 12px 16px;
        text-align: left;
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      th.col-rank,
      td.col-rank {
        width: 50px;
        text-align: center;
      }
      th.col-count,
      td.col-count {
        width: 80px;
        text-align: right;
      }
      td {
        padding: 10px 16px;
        font-size: 14px;
        border-bottom: 1px solid #f0f0f0;
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr:hover {
        background: #fef6ee;
      }
      .footer-note {
        text-align: center;
        color: #999;
        font-size: 13px;
        margin-top: 24px;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-left">
        <h1><a id="pageTitle" href="/">SB Food Week 2026</a></h1>
        <span class="header-sub">Admin</span>
      </div>
      <a class="back-link" href="/">Back to Map</a>
    </header>

    <main>
      <div class="auth-card" id="authCard">
        <h2>Admin Access</h2>
        <p>Enter the admin password to view search data.</p>
        <form id="authForm">
          <input
            type="password"
            id="tokenInput"
            placeholder="Password"
            autocomplete="off"
          />
          <button type="submit">Sign In</button>
        </form>
        <div class="auth-error" id="authError">Invalid password. Try again.</div>
      </div>

      <div class="data-view" id="dataView">
        <p class="stat-total">
          Total searches (last 7 days): <strong id="totalCount">—</strong>
        </p>
        <table>
          <thead>
            <tr>
              <th class="col-rank">#</th>
              <th>Search Query</th>
              <th class="col-count">Count</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <p class="footer-note">Last 7 days · Top 500 queries</p>
      </div>
    </main>

    <script src="admin.js"></script>
  </body>
</html>
