name = "sbsandwichweek-track"
main = "index.js"
compatibility_date = "2024-01-01"

[vars]
ACCOUNT_ID = "95bdaad9a0525e9a9af474a004504732"
# Analytics Engine dataset queried by the stats/admin endpoints.
DATASET_NAME = "sbsandwichweek"
# Write cutoff — POSTs self-disable after EVENT_END + like-grace window.
EVENT_START = "2026-06-25"
EVENT_END = "2026-07-01"
# Cloudflare Web Analytics site tag — NOT the beacon token from config.js
# cfAnalyticsToken (those differ for this site; see snapshots/rum-2026-07-02.json
# meta note). Required by the RUM GraphQL queries for device/browser/OS.
RUM_SITE_TAG = "584145a2cc5c423f84890c1f76a17081"

[[analytics_engine_datasets]]
binding = "TRACKER"
dataset = "sbsandwichweek"
