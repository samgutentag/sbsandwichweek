name = "sbsandwichweek-track"
main = "index.js"
compatibility_date = "2024-01-01"

[vars]
ACCOUNT_ID = "95bdaad9a0525e9a9af474a004504732"
# Analytics Engine dataset queried by the stats/admin endpoints.
DATASET_NAME = "sbsandwichweek"
# Write cutoff — POSTs self-disable after EVENT_END + like-grace window.
EVENT_START = "2026-06-25"
EVENT_END = "2026-07-01"
# Cloudflare Web Analytics site tag (same value as config.js cfAnalyticsToken).
# Required by the RUM GraphQL queries for device/browser/OS + live visitors.
RUM_SITE_TAG = "bae17b8a85d54610965c8c8662738354"

[[analytics_engine_datasets]]
binding = "TRACKER"
dataset = "sbsandwichweek"
